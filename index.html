  <script>
    (function () {
      const root = document.documentElement;
      try {
        const stored = localStorage.getItem('mdw-theme');
        const preference = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const effective = preference === 'light' || preference === 'dark'
          ? preference
          : (prefersDark ? 'dark' : 'light');
        root.dataset.theme = effective;
        root.dataset.themePreference = preference;
      } catch (error) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        root.dataset.theme = prefersDark ? 'dark' : 'light';
        root.dataset.themePreference = 'system';
      }
    })();
  </script>

  <script>
    (function () {
      const STORAGE_KEY = 'mdw-lang';
      const LANG_TRANSITION_DURATION = 320;
      const translations = {
        en: {
          navCatch: 'Philosophy',
          navProducts: 'Product',
          tagline: 'Masahi_desu',
          heroBody: 'Observe behavior. Return behavior. Quietly change the feel.',
          heroPrimaryCta: 'Go to Products',
          productsLabel: 'Product Links',
          productsTitle: 'Behavior catalog',
          productsBody: 'Jump directly into the key products.',
          productsAllCta: 'All Products',
          productsLoading: 'Loading products',
          productCta: 'Open',
          productExternalCta: 'Visit',
          themeLabel: 'Theme',
          themeSystem: 'System',
          themeLight: 'Light',
          themeDark: 'Dark'
        }
      };
      const fallbackCopy = {};
      const jaCopy = {
        productsTitle: 'Behavior catalog',
        productsAllCta: 'プロダクト一覧',
        productCta: '開く',
        productExternalCta: '公式サイトへ'
      };
      const productGrid = document.getElementById('home-product-grid');
      const sectionButtons = Array.from(document.querySelectorAll('.home-section-nav__button'));
      const sectionNav = document.querySelector('.home-section-nav__track');
      const footerNavLink = document.querySelector('.home-section-nav__footer-link');
      const footerTarget = footerNavLink ? document.getElementById(footerNavLink.dataset.footerTarget) : null;
      const sections = Array.from(document.querySelectorAll('[data-home-section]'));
      const sectionTargetIds = new Set(sectionButtons.map((button) => button.dataset.sectionTarget).filter(Boolean));
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      const SECTION_NAV_LOCK_MS = 720;
      const SECTION_SCROLL_SETTLE_MS = 640;
      const WHEEL_SECTION_THRESHOLD = 86;
      const WHEEL_RESET_MS = 180;
      const TOUCH_SECTION_THRESHOLD = 48;
      const TOUCH_INTENT_THRESHOLD = 10;
      const TOUCH_MOMENTUM_SETTLE_MS = 520;
      const SECTION_ALIGN_ENFORCE_FRAMES = 36;
      const TOUCH_ACTIVITY_STALE_MS = 1100;
      const PRODUCT_CAROUSEL_SPEED = 26;
      const PRODUCT_CAROUSEL_MIN_DURATION = 54;
      let productCatalog = [];
      let activeSectionTarget = sectionButtons[0] ? sectionButtons[0].dataset.sectionTarget : '';
      let activeNavTarget = activeSectionTarget;
      let sectionNavLockUntil = 0;
      let pendingHomeSection = null;
      let pendingFooterScroll = false;
      let sectionSettleTimer = null;
      let sectionAlignFrame = null;
      let restAlignTimer = null;
      let restSampleScrollY = null;
      let productCarouselInteractionTimer = null;
      let productCarouselPointerState = null;
      let productCarouselSuppressClick = false;
      let productCarouselNormalizingScroll = false;
      let touchPointsActive = 0;
      let lastTouchEventAt = 0;
      let wheelDeltaY = 0;
      let wheelResetTimer = null;
      let touchStartX = 0;
      let touchStartY = 0;
      let touchSectionHandled = false;
      let currentLang = resolveLocale(readStoredLanguage() || 'ja');

      function syncSectionViewportSize() {
        const viewport = window.visualViewport;
        const width = Math.round(viewport && viewport.width ? viewport.width : window.innerWidth);
        const height = Math.round(viewport && viewport.height ? viewport.height : window.innerHeight);
        if (width > 0) {
          document.documentElement.style.setProperty('--home-section-width', `${width}px`);
        }
        if (height > 0) {
          document.documentElement.style.setProperty('--home-section-height', `${height}px`);
        }
      }

      function setupSectionViewportSizing() {
        syncSectionViewportSize();
        window.addEventListener('resize', () => {
          syncSectionViewportSize();
          syncProductCarouselMetrics();
        });
        window.addEventListener('orientationchange', () => {
          syncSectionViewportSize();
          syncProductCarouselMetrics();
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', () => {
            syncSectionViewportSize();
            syncProductCarouselMetrics();
          });
        }
      }

      function recordFallbacks() {
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n');
          if (!key || Object.prototype.hasOwnProperty.call(fallbackCopy, key)) {
            return;
          }
          fallbackCopy[key] = el.textContent.replace(/\s+$/u, '');
        });
      }

      function resolveLocale(locale) {
        if (locale === 'ja') {
          return 'ja';
        }
        return Object.prototype.hasOwnProperty.call(translations, locale) ? locale : 'ja';
      }

      function syncLanguageSelects(lang) {
        document.querySelectorAll('.lang-select').forEach((select) => {
          if (select.value !== lang) {
            select.value = lang;
          }
        });
      }

      function getCopy(lang, key) {
        if (lang !== 'ja' && translations[lang] && typeof translations[lang][key] === 'string') {
          return translations[lang][key];
        }
        if (lang === 'ja' && typeof jaCopy[key] === 'string') {
          return jaCopy[key];
        }
        return fallbackCopy[key] || '';
      }

      function buildProductHref(item) {
        const externalUrl = typeof item.url === 'string' ? item.url.trim() : '';
        if (externalUrl) {
          return { href: externalUrl, external: true };
        }
        let path = `products/${item.dir || ''}`;
        if (!/\.html?$/u.test(path)) {
          if (!path.endsWith('/')) {
            path = `${path}/`;
          }
          path = `${path}index.html`;
        }
        return { href: path, external: false };
      }

      function syncProductCarouselMetrics() {
        if (!productGrid) {
          return;
        }
        const track = productGrid.querySelector('.home-product-track');
        if (!track) {
          return;
        }
        const firstClone = track.querySelector('.home-product-card--clone');
        if (!firstClone) {
          track.classList.add('home-product-track--static');
          productGrid.style.setProperty('--home-product-distance', '0px');
          productGrid.style.setProperty('--home-product-duration', `${PRODUCT_CAROUSEL_MIN_DURATION}s`);
          return;
        }
        track.classList.remove('home-product-track--static');
        const distance = Math.max(0, Math.round(firstClone.offsetLeft));
        const duration = Math.max(
          PRODUCT_CAROUSEL_MIN_DURATION,
          Number((distance / PRODUCT_CAROUSEL_SPEED).toFixed(2))
        );
        productGrid.style.setProperty('--home-product-distance', `${distance}px`);
        productGrid.style.setProperty('--home-product-duration', `${duration}s`);
        normalizeProductCarouselScroll();
      }

      function isProductCarouselTarget(target) {
        return Boolean(productGrid && target instanceof Node && productGrid.contains(target));
      }

      function isProductCarouselEvent(event) {
        return Boolean(event && isProductCarouselTarget(event.target));
      }

      function getProductCarouselDistance() {
        if (!productGrid) {
          return 0;
        }
        const value = Number.parseFloat(productGrid.style.getPropertyValue('--home-product-distance'));
        return Number.isFinite(value) ? value : 0;
      }

      function normalizeProductCarouselScroll() {
        if (!productGrid || productCarouselNormalizingScroll) {
          return;
        }
        const distance = getProductCarouselDistance();
        if (distance <= 1 || productGrid.scrollWidth <= productGrid.clientWidth + 1) {
          return;
        }
        const maxScrollLeft = productGrid.scrollWidth - productGrid.clientWidth;
        if (maxScrollLeft <= distance + 1 || productGrid.scrollLeft < distance) {
          return;
        }
        const nextScrollLeft = productGrid.scrollLeft % distance;
        productCarouselNormalizingScroll = true;
        productGrid.scrollLeft = nextScrollLeft;
        window.requestAnimationFrame(() => {
          productCarouselNormalizingScroll = false;
        });
      }

      function scheduleProductCarouselResume(delay = 900) {
        if (!productGrid) {
          return;
        }
        if (productCarouselInteractionTimer !== null) {
          window.clearTimeout(productCarouselInteractionTimer);
        }
        productCarouselInteractionTimer = window.setTimeout(() => {
          productCarouselInteractionTimer = null;
          if (!productCarouselPointerState) {
            productGrid.classList.remove('is-user-scrolling');
          }
        }, delay);
      }

      function pauseProductCarouselForInteraction(delay = 900) {
        if (!productGrid) {
          return;
        }
        productGrid.classList.add('is-user-scrolling');
        normalizeProductCarouselScroll();
        if (!productCarouselPointerState) {
          scheduleProductCarouselResume(delay);
        }
      }

      function handleProductCarouselPointerDown(event) {
        if (!productGrid || event.pointerType !== 'mouse' || event.button !== 0) {
          return;
        }
        productCarouselPointerState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startScrollLeft: productGrid.scrollLeft,
          moved: false
        };
        productGrid.classList.add('is-pointer-dragging');
        pauseProductCarouselForInteraction();
        productGrid.setPointerCapture(event.pointerId);
      }

      function handleProductCarouselPointerMove(event) {
        if (!productGrid || !productCarouselPointerState || productCarouselPointerState.pointerId !== event.pointerId) {
          return;
        }
        const deltaX = event.clientX - productCarouselPointerState.startX;
        if (Math.abs(deltaX) > 3) {
          productCarouselPointerState.moved = true;
        }
        productGrid.scrollLeft = productCarouselPointerState.startScrollLeft - deltaX;
        normalizeProductCarouselScroll();
        event.preventDefault();
      }

      function endProductCarouselPointer(event) {
        if (!productGrid || !productCarouselPointerState || productCarouselPointerState.pointerId !== event.pointerId) {
          return;
        }
        const didMove = productCarouselPointerState.moved;
        if (productGrid.hasPointerCapture(event.pointerId)) {
          productGrid.releasePointerCapture(event.pointerId);
        }
        productCarouselPointerState = null;
        productGrid.classList.remove('is-pointer-dragging');
        scheduleProductCarouselResume();
        if (didMove) {
          productCarouselSuppressClick = true;
          window.setTimeout(() => {
            productCarouselSuppressClick = false;
          }, 120);
        }
      }

      function handleProductCarouselClick(event) {
        if (!productCarouselSuppressClick) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();
      }

      function setupProductCarouselInteraction() {
        if (!productGrid || productGrid.dataset.carouselInteractionBound === 'true') {
          return;
        }
        productGrid.dataset.carouselInteractionBound = 'true';
        productGrid.addEventListener('scroll', () => {
          pauseProductCarouselForInteraction();
        }, { passive: true });
        productGrid.addEventListener('wheel', (event) => {
          if (Math.abs(event.deltaX) > 1 || event.shiftKey) {
            pauseProductCarouselForInteraction();
          }
        }, { passive: true });
        productGrid.addEventListener('pointerdown', handleProductCarouselPointerDown);
        productGrid.addEventListener('pointermove', handleProductCarouselPointerMove);
        productGrid.addEventListener('pointerup', endProductCarouselPointer);
        productGrid.addEventListener('pointercancel', endProductCarouselPointer);
        productGrid.addEventListener('click', handleProductCarouselClick, true);
      }

      function renderProductCards(lang) {
        if (!productGrid || productCatalog.length === 0) {
          return;
        }
        const entries = productCatalog
          .slice()
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        productGrid.innerHTML = '';
        productGrid.style.setProperty('--home-product-count', String(entries.length));

        const track = document.createElement('div');
        track.className = 'home-product-track';

        const appendProductCard = (item, index, isClone) => {
          const linkInfo = buildProductHref(item);
          const link = document.createElement('a');
          link.href = linkInfo.href;
          link.className = 'home-product-card';
          link.dataset.homeAnimate = 'true';
          link.draggable = false;
          link.style.setProperty('--home-delay', `${(index % entries.length) * 60}ms`);
          if (isClone) {
            link.classList.add('home-product-card--clone');
            link.setAttribute('aria-hidden', 'true');
            link.tabIndex = -1;
          }
          if (linkInfo.external) {
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
          }

          const titleText = lang === 'en' ? (item.title_en || item.title) : (item.title_ja || item.title);
          const descText = lang === 'en' ? (item.desc_en || item.desc) : (item.desc_ja || item.desc);
          const headerPath = (item.header || '').trim();
          const iconPath = (item.image || '').trim();
          const hasHeader = Boolean(headerPath);
          const hasIcon = Boolean(iconPath);
          const hasMedia = hasHeader || hasIcon;

          if (hasMedia) {
            const media = document.createElement('div');
            media.className = 'home-product-card__media';

            if (hasHeader) {
              const image = document.createElement('img');
              image.src = `products/${item.dir || ''}${headerPath}`;
              image.alt = `${titleText} preview`;
              image.className = 'home-product-card__media-image';
              image.loading = 'lazy';
              image.draggable = false;
              media.appendChild(image);
            } else {
              const placeholder = document.createElement('div');
              placeholder.className = 'home-product-card__media-placeholder';
              media.appendChild(placeholder);
            }

            if (hasIcon) {
              const iconBadge = document.createElement('div');
              iconBadge.className = 'home-product-card__icon-badge';

              const icon = document.createElement('img');
              icon.src = `products/${item.dir || ''}${iconPath}`;
              icon.alt = `${titleText} icon`;
              icon.className = 'home-product-card__icon';
              icon.loading = 'lazy';
              icon.draggable = false;

              iconBadge.appendChild(icon);
              media.appendChild(iconBadge);
            }

            link.appendChild(media);
          }

          const body = document.createElement('div');
          body.className = 'home-product-card__body';

          const title = document.createElement('h3');
          title.className = 'home-product-card__title';
          title.textContent = titleText;

          const description = document.createElement('p');
          description.className = 'home-product-card__description';
          description.textContent = descText;

          const meta = document.createElement('span');
          meta.className = 'home-product-card__cta';
          meta.textContent = linkInfo.external ? getCopy(lang, 'productExternalCta') : getCopy(lang, 'productCta');

          const arrow = document.createElement('span');
          arrow.setAttribute('aria-hidden', 'true');
          arrow.textContent = linkInfo.external ? '↗' : '→';
          meta.appendChild(arrow);

          body.appendChild(title);
          body.appendChild(description);
          body.appendChild(meta);
          link.appendChild(body);
          track.appendChild(link);
        };

        entries.forEach((item, index) => appendProductCard(item, index, false));
        if (entries.length > 1) {
          for (let cloneSet = 0; cloneSet < 2; cloneSet += 1) {
            entries.forEach((item, index) => appendProductCard(item, index, true));
          }
        }
        productGrid.appendChild(track);
        syncProductCarouselMetrics();
        window.requestAnimationFrame(syncProductCarouselMetrics);

        if (window.mdwTheme && typeof window.mdwTheme.focusPressables === 'function') {
          window.mdwTheme.focusPressables(productGrid);
        }
        productGrid.querySelectorAll('.home-product-card--clone').forEach((link) => {
          link.setAttribute('aria-hidden', 'true');
          link.tabIndex = -1;
        });
      }

      function updateLanguage(locale) {
        recordFallbacks();
        const lang = resolveLocale(locale);
        currentLang = lang;
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n');
          if (!key) {
            return;
          }
          if (lang === 'ja') {
            const fallback = fallbackCopy[key];
            if (typeof fallback === 'string') {
              el.textContent = fallback;
            }
            return;
          }
          const text = translations[lang][key];
          if (typeof text === 'string') {
            el.textContent = text;
            return;
          }
          const fallback = fallbackCopy[key];
          if (typeof fallback === 'string') {
            el.textContent = fallback;
          }
        });
        syncLanguageSelects(lang);
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (error) {
          /* ignore */
        }
        renderProductCards(lang);
        return lang;
      }

      function readStoredLanguage() {
        try {
          return localStorage.getItem(STORAGE_KEY);
        } catch (error) {
          return null;
        }
      }

      const controller = window.MDWLanguageTransition
        ? window.MDWLanguageTransition.create((lang) => updateLanguage(lang), { duration: LANG_TRANSITION_DURATION })
        : null;

      function applyLanguage(locale, options = {}) {
        const target = resolveLocale(locale);
        if (controller) {
          controller.apply(target, options);
        } else {
          updateLanguage(target);
        }
      }

      function setupLanguageSelector() {
        document.querySelectorAll('.lang-select').forEach((select) => {
          if (select.dataset.bound === 'true') {
            select.value = currentLang;
            return;
          }
          select.dataset.bound = 'true';
          select.addEventListener('change', (event) => {
            applyLanguage(event.target.value, { animate: true });
          });
          select.value = currentLang;
        });
      }

      function updateSectionNav(targetId) {
        if (sectionTargetIds.has(targetId)) {
          activeSectionTarget = targetId;
        }
        if (targetId) {
          activeNavTarget = targetId;
        }
        const visibleTarget = activeNavTarget || activeSectionTarget;
        let activeControl = null;
        sectionButtons.forEach((button) => {
          const active = button.dataset.sectionTarget === visibleTarget;
          button.classList.toggle('is-active', active);
          button.setAttribute('aria-current', active ? 'true' : 'false');
          if (active) {
            activeControl = button;
          }
        });
        if (footerNavLink) {
          const active = footerNavLink.dataset.footerTarget === visibleTarget;
          footerNavLink.classList.toggle('is-active', active);
          footerNavLink.setAttribute('aria-current', active ? 'true' : 'false');
          if (active) {
            activeControl = footerNavLink;
          }
        }
        if (activeControl && sectionNav) {
          sectionNav.style.setProperty('--segment-x', `${activeControl.offsetLeft}px`);
          sectionNav.style.setProperty('--segment-width', `${activeControl.offsetWidth}px`);
        }
      }

      function getSectionIndexById(sectionId) {
        return sections.findIndex((section) => section.id === sectionId);
      }

      function getFooterAdjacentSection() {
        return sections.length > 0 ? sections[sections.length - 1] : null;
      }

      function updateFooterNav() {
        if (!footerTarget) {
          return;
        }
        const adjacentSection = getFooterAdjacentSection();
        if (adjacentSection) {
          activeSectionTarget = adjacentSection.id;
        }
        updateSectionNav(footerTarget.id);
      }

      function getDirectionalSection(direction) {
        if (direction === 0 || sections.length === 0) {
          return null;
        }
        if (isFooterNavPosition()) {
          return direction > 0 ? null : getFooterAdjacentSection();
        }
        const tolerance = Math.max(4, Math.round(window.innerHeight * 0.06));
        if (direction > 0) {
          const nextVisible = sections.find((section) => section.getBoundingClientRect().top > tolerance);
          if (nextVisible) {
            return nextVisible;
          }
          const activeIndex = getSectionIndexById(activeSectionTarget);
          return activeIndex >= 0 && activeIndex < sections.length - 1 ? sections[activeIndex + 1] : null;
        }
        for (let index = sections.length - 1; index >= 0; index -= 1) {
          if (sections[index].getBoundingClientRect().top < -tolerance) {
            return sections[index];
          }
        }
        const activeIndex = getSectionIndexById(activeSectionTarget);
        return activeIndex > 0 ? sections[activeIndex - 1] : null;
      }

      function canNavigateInDirection(direction) {
        if (getDirectionalSection(direction)) {
          return true;
        }
        return direction > 0 && Boolean(footerTarget) && !isFooterNavPosition();
      }

      function getDocumentBottomScrollTop() {
        const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
        const documentHeight = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight
        );
        return Math.max(0, Math.round(documentHeight - viewportHeight));
      }

      function clearWheelAccumulation() {
        wheelDeltaY = 0;
        if (wheelResetTimer !== null) {
          window.clearTimeout(wheelResetTimer);
          wheelResetTimer = null;
        }
      }

      function isSectionNavigationLocked() {
        return Date.now() < sectionNavLockUntil;
      }

      function getSectionScrollTop(section) {
        return Math.round(section.getBoundingClientRect().top + window.scrollY);
      }

      function clearSectionSettleTimer() {
        if (sectionSettleTimer !== null) {
          window.clearTimeout(sectionSettleTimer);
          sectionSettleTimer = null;
        }
      }

      function cancelScrollAlignment() {
        if (sectionAlignFrame !== null) {
          window.cancelAnimationFrame(sectionAlignFrame);
          sectionAlignFrame = null;
        }
      }

      function enforceScrollAlignment(readTargetTop) {
        // iOS Safari は慣性スクロール中のプログラムスクロールを無視することがあるため、
        // 一発の scrollTo ではなく数フレームにわたり整合するまで再適用する。
        cancelScrollAlignment();
        let framesLeft = SECTION_ALIGN_ENFORCE_FRAMES;
        const step = () => {
          sectionAlignFrame = null;
          const targetTop = readTargetTop();
          if (targetTop === null) {
            return;
          }
          if (Math.abs(window.scrollY - targetTop) > 1) {
            window.scrollTo({
              top: targetTop,
              behavior: 'auto'
            });
          }
          framesLeft -= 1;
          if (framesLeft > 0) {
            sectionAlignFrame = window.requestAnimationFrame(step);
          }
        };
        step();
      }

      function isViewportZoomed() {
        return Boolean(window.visualViewport && window.visualViewport.scale > 1.02);
      }

      function scheduleRestAlignmentCheck(delay) {
        if (restAlignTimer !== null) {
          window.clearTimeout(restAlignTimer);
        }
        restAlignTimer = window.setTimeout(runRestAlignmentCheck, delay);
      }

      function runRestAlignmentCheck() {
        // マルチタッチやシステムジェスチャなど JS が関与しない経路でスクロールが
        // 起きても、静止位置は必ずセクション境界かフッター末尾になるよう常時監視する。
        restAlignTimer = null;
        // 長押し等でシステムがジェスチャを奪うと touchend/touchcancel が届かないまま
        // スクロールされることがある。タッチイベントが一定時間途絶えていたら
        // 指の情報は無効とみなして補正を進める。
        const touchRecentlyActive = touchPointsActive > 0 && (Date.now() - lastTouchEventAt) < TOUCH_ACTIVITY_STALE_MS;
        if (touchRecentlyActive || isSectionNavigationLocked() || pendingHomeSection || pendingFooterScroll || sectionAlignFrame !== null) {
          restSampleScrollY = null;
          scheduleRestAlignmentCheck(320);
          return;
        }
        touchPointsActive = 0;
        if (isViewportZoomed() || sections.length === 0) {
          return;
        }
        const current = window.scrollY;
        // 進行中のアニメーションや遅いドラッグと争わないよう、同じ位置を
        // 2回連続で観測してから(= 実際に静止してから)補正する。
        if (restSampleScrollY === null || Math.abs(restSampleScrollY - current) > 2) {
          restSampleScrollY = current;
          scheduleRestAlignmentCheck(220);
          return;
        }
        restSampleScrollY = null;
        let nearestSection = null;
        let nearestDistance = Infinity;
        sections.forEach((section) => {
          const distance = Math.abs(getSectionScrollTop(section) - current);
          if (distance < nearestDistance) {
            nearestDistance = distance;
            nearestSection = section;
          }
        });
        let alignToFooter = false;
        if (footerTarget) {
          const footerDistance = Math.abs(getDocumentBottomScrollTop() - current);
          if (footerDistance < nearestDistance) {
            nearestDistance = footerDistance;
            alignToFooter = true;
          }
        }
        const tolerance = Math.max(4, Math.round(window.innerHeight * 0.02));
        if (nearestDistance > tolerance) {
          sectionNavLockUntil = Date.now() + (reduceMotion.matches ? 160 : 480);
          if (alignToFooter) {
            enforceScrollAlignment(() => getDocumentBottomScrollTop());
          } else {
            const target = nearestSection;
            enforceScrollAlignment(() => getSectionScrollTop(target));
          }
        }
        if (alignToFooter) {
          updateFooterNav();
        } else {
          updateSectionNav(nearestSection.id);
        }
      }

      function settleHomeSection(section, delay = SECTION_SCROLL_SETTLE_MS) {
        clearSectionSettleTimer();
        sectionSettleTimer = window.setTimeout(() => {
          sectionSettleTimer = null;
          if (!section || pendingHomeSection !== section) {
            return;
          }
          enforceScrollAlignment(() => getSectionScrollTop(section));
          updateSectionNav(section.id);
          pendingHomeSection = null;
        }, reduceMotion.matches ? 80 : delay);
      }

      function settleFooterScroll(delay = SECTION_SCROLL_SETTLE_MS) {
        clearSectionSettleTimer();
        sectionSettleTimer = window.setTimeout(() => {
          sectionSettleTimer = null;
          if (!pendingFooterScroll) {
            return;
          }
          pendingFooterScroll = false;
          enforceScrollAlignment(() => getDocumentBottomScrollTop());
          updateFooterNav();
        }, reduceMotion.matches ? 80 : delay);
      }

      function scrollToHomeSection(section) {
        if (!section) {
          return;
        }
        cancelScrollAlignment();
        sectionNavLockUntil = Date.now() + (reduceMotion.matches ? 160 : Math.max(SECTION_NAV_LOCK_MS, SECTION_SCROLL_SETTLE_MS + 140));
        pendingHomeSection = section;
        pendingFooterScroll = false;
        updateSectionNav(section.id);
        if (window.history && window.history.replaceState && window.location.hash === '#home-footer') {
          window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
        }
        window.scrollTo({
          top: getSectionScrollTop(section),
          behavior: reduceMotion.matches ? 'auto' : 'smooth',
        });
        settleHomeSection(section);
      }

      function scrollToFooter(options = {}) {
        if (!footerTarget) {
          return;
        }
        pendingHomeSection = null;
        pendingFooterScroll = true;
        cancelScrollAlignment();
        clearSectionSettleTimer();
        sectionNavLockUntil = Date.now() + (reduceMotion.matches ? 160 : Math.max(SECTION_NAV_LOCK_MS, SECTION_SCROLL_SETTLE_MS + 140));
        updateFooterNav();
        footerTarget.scrollIntoView({
          behavior: reduceMotion.matches ? 'auto' : 'smooth',
          block: 'end'
        });
        if (options.updateHistory !== false && window.history && window.history.pushState) {
          window.history.pushState(null, '', `#${footerTarget.id}`);
        }
        settleFooterScroll();
      }

      function isFooterNavPosition() {
        if (!footerTarget) {
          return false;
        }
        const viewportHeight = window.innerHeight || document.documentElement.clientHeight;
        const documentHeight = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight
        );
        const distanceFromBottom = documentHeight - (window.scrollY + viewportHeight);
        return distanceFromBottom <= Math.max(12, footerTarget.offsetHeight * 0.4);
      }

      function syncFooterNavState() {
        if (isSectionNavigationLocked()) {
          return;
        }
        if (isFooterNavPosition()) {
          updateFooterNav();
        }
      }

      function navigateSectionByDirection(direction, event) {
        const target = getDirectionalSection(direction);
        if (!target) {
          if (direction > 0 && footerTarget && !isFooterNavPosition()) {
            if (event && event.cancelable) {
              event.preventDefault();
            }
            if (isSectionNavigationLocked()) {
              return true;
            }
            clearWheelAccumulation();
            scrollToFooter({ updateHistory: false });
            return true;
          }
          clearWheelAccumulation();
          return false;
        }
        if (event && event.cancelable) {
          event.preventDefault();
        }
        if (isSectionNavigationLocked()) {
          return true;
        }
        clearWheelAccumulation();
        scrollToHomeSection(target);
        return true;
      }

      function normalizeWheelDelta(event) {
        if (event.deltaMode === 1) {
          return event.deltaY * 16;
        }
        if (event.deltaMode === 2) {
          return event.deltaY * window.innerHeight;
        }
        return event.deltaY;
      }

      function handleSectionWheel(event) {
        if (isProductCarouselEvent(event) && (event.shiftKey || Math.abs(event.deltaX) > Math.abs(event.deltaY))) {
          pauseProductCarouselForInteraction();
          return;
        }
        const deltaY = normalizeWheelDelta(event);
        if (Math.abs(deltaY) < 1) {
          return;
        }
        const direction = deltaY > 0 ? 1 : -1;
        if (!canNavigateInDirection(direction)) {
          clearWheelAccumulation();
          return;
        }
        if (event.cancelable) {
          event.preventDefault();
        }
        if (isSectionNavigationLocked()) {
          return;
        }
        if (wheelDeltaY !== 0 && Math.sign(wheelDeltaY) !== direction) {
          wheelDeltaY = 0;
        }
        wheelDeltaY += deltaY;
        if (wheelResetTimer !== null) {
          window.clearTimeout(wheelResetTimer);
        }
        wheelResetTimer = window.setTimeout(clearWheelAccumulation, WHEEL_RESET_MS);
        if (Math.abs(wheelDeltaY) >= WHEEL_SECTION_THRESHOLD) {
          navigateSectionByDirection(direction, event);
        }
      }

      function markTouchActivity(event) {
        lastTouchEventAt = Date.now();
        touchPointsActive = event.touches ? event.touches.length : 0;
      }

      function handleSectionTouchStart(event) {
        markTouchActivity(event);
        // システムに奪われたジェスチャは以降のイベントが一切届かないことがあるため、
        // タッチ開始時点で stale 判定後の検査を予約しておく。
        scheduleRestAlignmentCheck(TOUCH_ACTIVITY_STALE_MS + 320);
        if (event.touches.length !== 1) {
          return;
        }
        touchStartX = event.touches[0].clientX;
        touchStartY = event.touches[0].clientY;
        touchSectionHandled = false;
      }

      function handleSectionTouchMove(event) {
        markTouchActivity(event);
        if (event.touches.length !== 1) {
          return;
        }
        const touch = event.touches[0];
        const deltaX = touchStartX - touch.clientX;
        const deltaY = touchStartY - touch.clientY;
        const absDeltaX = Math.abs(deltaX);
        const absDeltaY = Math.abs(deltaY);
        if (isProductCarouselEvent(event)) {
          if (absDeltaX >= TOUCH_INTENT_THRESHOLD && absDeltaX > absDeltaY) {
            pauseProductCarouselForInteraction();
            return;
          }
          if (absDeltaY < TOUCH_INTENT_THRESHOLD) {
            return;
          }
        }
        // 最初の touchmove から必ず preventDefault する。iOS Safari は一度ネイティブ
        // スクロールが始まると以降の touchmove を cancelable:false にするため、
        // 意図判定を待ってから preventDefault しても縦パンを止められない。
        if (event.cancelable) {
          event.preventDefault();
        }
        if (absDeltaY < TOUCH_INTENT_THRESHOLD || absDeltaY < absDeltaX * 1.25) {
          return;
        }
        const direction = deltaY > 0 ? 1 : -1;
        if (!canNavigateInDirection(direction)) {
          return;
        }
        if (touchSectionHandled || absDeltaY < TOUCH_SECTION_THRESHOLD) {
          return;
        }
        touchSectionHandled = navigateSectionByDirection(direction);
      }

      function handleSectionTouchEnd(event) {
        if (event) {
          markTouchActivity(event);
        } else {
          touchPointsActive = 0;
        }
        if (touchSectionHandled) {
          if (pendingHomeSection) {
            sectionNavLockUntil = Date.now() + (reduceMotion.matches ? 160 : TOUCH_MOMENTUM_SETTLE_MS + 140);
            settleHomeSection(pendingHomeSection, TOUCH_MOMENTUM_SETTLE_MS);
          } else if (pendingFooterScroll) {
            sectionNavLockUntil = Date.now() + (reduceMotion.matches ? 160 : TOUCH_MOMENTUM_SETTLE_MS + 140);
            settleFooterScroll(TOUCH_MOMENTUM_SETTLE_MS);
          }
        }
        touchSectionHandled = false;
        if (touchPointsActive === 0) {
          scheduleRestAlignmentCheck(TOUCH_MOMENTUM_SETTLE_MS + 200);
        }
      }

      function setupSectionNavigation() {
        if (sections.length > 0) {
          document.documentElement.classList.add('home-scroll-managed');
        }
        sectionButtons.forEach((button) => {
          button.addEventListener('click', () => {
            const section = document.getElementById(button.dataset.sectionTarget);
            if (!section) {
              return;
            }
            scrollToHomeSection(section);
          });
        });

        document.querySelectorAll('[data-section-link]').forEach((link) => {
          link.addEventListener('click', (event) => {
            const section = document.getElementById(link.dataset.sectionLink);
            if (!section) {
              return;
            }
            event.preventDefault();
            scrollToHomeSection(section);
          });
        });

        if (footerNavLink) {
          footerNavLink.addEventListener('click', (event) => {
            event.preventDefault();
            scrollToFooter();
          });
        }

        if ('IntersectionObserver' in window) {
          const observer = new IntersectionObserver((entries) => {
            const visible = entries
              .filter((entry) => entry.isIntersecting)
              .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
            entries.forEach((entry) => {
              entry.target.classList.toggle('is-visible', entry.isIntersecting);
            });
            if (isSectionNavigationLocked() && activeNavTarget) {
              updateSectionNav(activeNavTarget);
              return;
            }
            if (isFooterNavPosition()) {
              updateFooterNav();
              return;
            }
            if (visible && visible.target.id) {
              updateSectionNav(visible.target.id);
            }
          }, { threshold: [0.42, 0.58, 0.72] });
          sections.forEach((section) => observer.observe(section));
        }

        window.addEventListener('wheel', handleSectionWheel, { passive: false });
        window.addEventListener('scroll', syncFooterNavState, { passive: true });
        if ('ontouchstart' in window || window.matchMedia('(any-pointer: coarse)').matches) {
          window.addEventListener('scroll', () => scheduleRestAlignmentCheck(260), { passive: true });
        }
        window.addEventListener('touchstart', handleSectionTouchStart, { passive: true });
        window.addEventListener('touchmove', handleSectionTouchMove, { passive: false });
        window.addEventListener('touchend', handleSectionTouchEnd, { passive: true });
        window.addEventListener('touchcancel', handleSectionTouchEnd, { passive: true });
        updateSectionNav(sectionButtons[0] ? sectionButtons[0].dataset.sectionTarget : '');
        window.addEventListener('resize', () => {
          const active = sectionButtons.find((button) => button.classList.contains('is-active'));
          if (active) {
            updateSectionNav(active.dataset.sectionTarget);
          }
        });
      }

      function loadFeaturedProducts() {
        if (!productGrid) {
          return;
        }
        fetch('products/index.json')
          .then((response) => {
            if (!response.ok) {
              throw new Error('products/index.json の読み込みに失敗しました');
            }
            return response.json();
          })
          .then((items) => {
            productCatalog = Array.isArray(items) ? items : [];
            renderProductCards(currentLang);
          })
          .catch(() => {
            productGrid.innerHTML = '';
            const fallback = document.createElement('a');
            fallback.href = 'products/index.html';
            fallback.className = 'home-product-card home-product-card--fallback';
            fallback.dataset.transitionDirection = 'right';
            fallback.textContent = getCopy(currentLang, 'productsAllCta') || 'プロダクト一覧';
            productGrid.appendChild(fallback);
          });
      }

      setupSectionViewportSizing();
      applyLanguage(currentLang);
      setupSectionNavigation();
      setupProductCarouselInteraction();
      loadFeaturedProducts();
      setupLanguageSelector();
      window.addEventListener('mdw:footer-loaded', () => {
        setupLanguageSelector();
        applyLanguage(currentLang);
      });
    })();
  </script>
</body>
</html>
