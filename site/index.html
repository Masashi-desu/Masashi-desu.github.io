  <script>
    (function () {
      const entries = typeof performance.getEntriesByType === 'function'
        ? performance.getEntriesByType('navigation')
        : [];
      const navEntry = entries && entries[0] ? entries[0] : null;
      const legacyReload = performance.navigation && performance.navigation.type === 1;
      const isReload = navEntry ? navEntry.type === 'reload' : legacyReload;
      if (!isReload) {
        return;
      }
      const canControlScrollRestoration = 'scrollRestoration' in history;
      const previousScrollRestoration = canControlScrollRestoration ? history.scrollRestoration : null;
      if (canControlScrollRestoration) {
        history.scrollRestoration = 'manual';
      }
      const restoreScrollRestoration = () => {
        if (canControlScrollRestoration && previousScrollRestoration) {
          history.scrollRestoration = previousScrollRestoration;
        }
      };
      const resetScroll = () => {
        window.scrollTo({
          left: 0,
          top: 0,
          behavior: 'auto'
        });
        if (window.MDWLiquidGL && typeof window.MDWLiquidGL.refresh === 'function') {
          window.MDWLiquidGL.refresh(0);
        }
      };
      resetScroll();
      document.addEventListener('DOMContentLoaded', resetScroll, { once: true });
      window.addEventListener('load', resetScroll, { once: true });
      window.addEventListener('pageshow', () => {
        resetScroll();
        window.setTimeout(restoreScrollRestoration, 0);
      }, { once: true });
    })();
  </script>

  <script>
    (function () {
      const root = document.documentElement;
      try {
        const stored = localStorage.getItem('mdw-theme');
        const preference = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const effective = preference === 'light' || preference === 'dark'
          ? preference
          : (prefersDark ? 'dark' : 'light');
        root.dataset.theme = effective;
        root.dataset.themePreference = preference;
      } catch (error) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        root.dataset.theme = prefersDark ? 'dark' : 'light';
        root.dataset.themePreference = 'system';
      }
    })();

  <script>
    (function () {
      const STORAGE_KEY = 'mdw-lang';
      const LANG_TRANSITION_DURATION = 320;
      const translations = {
        en: {
          navCatch: 'Philosophy',
          navProducts: 'Product',
          tagline: 'Masahi_desu',
          heroBody: 'Observe behavior. Return behavior. Quietly change the feel.',
          heroPrimaryCta: 'Go to Products',
          productsLabel: 'Product Links',
          productsTitle: 'Behavior catalog',
          productsBody: 'Jump directly into the key products.',
          productsAllCta: 'All Products',
          productsLoading: 'Loading products',
          productCta: 'Open',
          productExternalCta: 'Visit',
          themeLabel: 'Theme',
          themeSystem: 'System',
          themeLight: 'Light',
          themeDark: 'Dark'
        }
      };
      const fallbackCopy = {};
      const jaCopy = {
        productsTitle: 'Behavior catalog',
        productsAllCta: 'プロダクト一覧',
        productCta: '開く',
        productExternalCta: '公式サイトへ'
      };
      const productGrid = document.getElementById('home-product-grid');
      const sectionButtons = Array.from(document.querySelectorAll('.home-section-nav__button'));
      const sectionNav = document.querySelector('.home-section-nav__track');
      const footerNavLink = document.querySelector('.home-section-nav__footer-link');
      const footerTarget = footerNavLink ? document.getElementById(footerNavLink.dataset.footerTarget) : null;
      const sections = Array.from(document.querySelectorAll('[data-home-section]'));
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      const fineHoverPointer = window.matchMedia('(hover: hover) and (pointer: fine)');
      const PRODUCT_CAROUSEL_SPEED = 26;
      const PRODUCT_CAROUSEL_MAX_SETS = 8;
      const PRODUCT_CAROUSEL_RESUME_DELAY_MS = 900;
      let productCatalog = [];
      let productCarouselEmbla = null;
      let productCarouselSetRefreshTimer = null;
      let productCarouselDragStartLocation = null;
      let productCarouselSuppressClickUntil = 0;
      let sectionNavigation = null;
      let currentLang = resolveLocale(readStoredLanguage() || 'ja');

      const sectionViewport = window.MDWSegmentedScroll.createViewportCssSync({
        rootElement: document.documentElement,
        widthProperty: '--home-section-width',
        heightProperty: '--home-section-height',
        onChange: scheduleProductCarouselSetRefresh
      });

      function setupSectionViewportSizing() {
        sectionViewport.mount();
      }

      function recordFallbacks() {
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n');
          if (!key || Object.prototype.hasOwnProperty.call(fallbackCopy, key)) {
            return;
          }
          fallbackCopy[key] = el.textContent.replace(/\s+$/u, '');
        });
      }

      function resolveLocale(locale) {
        if (locale === 'ja') {
          return 'ja';
        }
        return Object.prototype.hasOwnProperty.call(translations, locale) ? locale : 'ja';
      }

      function syncLanguageSelects(lang) {
        document.querySelectorAll('.lang-select').forEach((select) => {
          if (select.value !== lang) {
            select.value = lang;
          }
        });
      }

      function getCopy(lang, key) {
        if (lang !== 'ja' && translations[lang] && typeof translations[lang][key] === 'string') {
          return translations[lang][key];
        }
        if (lang === 'ja' && typeof jaCopy[key] === 'string') {
          return jaCopy[key];
        }
        return fallbackCopy[key] || '';
      }

      function buildProductHref(item) {
        const externalUrl = typeof item.url === 'string' ? item.url.trim() : '';
        if (externalUrl) {
          return { href: externalUrl, external: true };
        }
        let path = `products/${item.dir || ''}`;
        if (!/\.html?$/u.test(path)) {
          if (!path.endsWith('/')) {
            path = `${path}/`;
          }
          path = `${path}index.html`;
        }
        return { href: appendProductSource(path, 'home'), external: false };
      }

      function appendProductSource(href, source) {
        const [baseWithSearch, hash = ''] = href.split('#');
        const separator = baseWithSearch.includes('?') ? '&' : '?';
        return `${baseWithSearch}${separator}from=${encodeURIComponent(source)}${hash ? `#${hash}` : ''}`;
      }

      function isProductCarouselTarget(target) {
        return Boolean(productGrid && target instanceof Node && productGrid.contains(target));
      }

      function isProductCarouselEvent(event) {
        return Boolean(event && isProductCarouselTarget(event.target));
      }

      function getProductCarouselAutoScroll() {
        if (!productCarouselEmbla) {
          return null;
        }
        const plugins = productCarouselEmbla.plugins();
        return plugins && plugins.autoScroll ? plugins.autoScroll : null;
      }

      function destroyProductCarousel() {
        if (productCarouselEmbla) {
          productCarouselEmbla.destroy();
          productCarouselEmbla = null;
        }
        if (productGrid) {
          productGrid.classList.remove('is-pointer-dragging');
        }
      }

      function getProductCarouselViewportWidth() {
        const gridWidth = productGrid ? productGrid.clientWidth : 0;
        return Math.max(gridWidth, Math.round(window.innerWidth) || 0);
      }

      // Embla の loop はコンテンツ幅がビューポートを十分上回っている必要があるため、
      // 描画時にクローンセットを静的に複製して確保する。スクロール中の DOM 追加/削除は
      // iOS Safari で描画抜けや位置ずれ(カードが消える不具合)の原因になるので行わない。
      function fillProductCarouselSets(track, appendCloneSet) {
        const targetWidth = getProductCarouselViewportWidth() * 2;
        let sets = 1;
        while (sets < PRODUCT_CAROUSEL_MAX_SETS && track.scrollWidth < targetWidth) {
          appendCloneSet();
          sets += 1;
        }
      }

      function setupProductCarousel(realCount) {
        if (!productGrid || realCount <= 1) {
          return;
        }
        if (typeof window.EmblaCarousel !== 'function') {
          productGrid.classList.add('home-product-grid--native-scroll');
          return;
        }
        productGrid.classList.remove('home-product-grid--native-scroll');
        const plugins = [];
        if (typeof window.EmblaCarouselAutoScroll === 'function') {
          plugins.push(window.EmblaCarouselAutoScroll({
            speed: PRODUCT_CAROUSEL_SPEED / 60,
            startDelay: PRODUCT_CAROUSEL_RESUME_DELAY_MS,
            playOnInit: !reduceMotion.matches,
            stopOnInteraction: false,
            stopOnMouseEnter: fineHoverPointer.matches,
            stopOnFocusIn: true
          }));
        }
        if (typeof window.EmblaCarouselWheelGestures === 'function') {
          plugins.push(window.EmblaCarouselWheelGestures());
        }
        productCarouselEmbla = window.EmblaCarousel(productGrid, {
          loop: true,
          align: 'start',
          dragFree: true,
          skipSnaps: true,
          watchSlides: false
        }, plugins);
        productCarouselEmbla.on('pointerDown', () => {
          productGrid.classList.add('is-pointer-dragging');
          productCarouselDragStartLocation = productCarouselEmbla.internalEngine().location.get();
        });
        productCarouselEmbla.on('pointerUp', () => {
          productGrid.classList.remove('is-pointer-dragging');
          const location = productCarouselEmbla.internalEngine().location.get();
          if (
            productCarouselDragStartLocation !== null &&
            Math.abs(location - productCarouselDragStartLocation) > 5
          ) {
            // ドラッグ直後に発生するクリックでリンク遷移しないよう短時間抑止する。
            // theme.js のページ遷移ハンドラは document キャプチャ段で動くため、
            // 抑止はさらに手前の window キャプチャ段で行う(setupProductCarouselClickGuard)。
            productCarouselSuppressClickUntil = Date.now() + 250;
          }
          productCarouselDragStartLocation = null;
        });
        // 回帰テスト(tests/playwright/home-product-carousel-mobile-loop.js)から
        // 自動スクロール状態を検証するための参照。
        productGrid.emblaApi = productCarouselEmbla;
      }

      function refreshProductCarouselSets() {
        if (!productGrid || !productCarouselEmbla) {
          return;
        }
        const track = productGrid.querySelector('.home-product-track');
        if (!track) {
          return;
        }
        const cardCount = track.querySelectorAll('.home-product-card').length;
        const needsMoreSets =
          track.scrollWidth < getProductCarouselViewportWidth() * 2 &&
          cardCount < productCatalog.length * PRODUCT_CAROUSEL_MAX_SETS;
        if (needsMoreSets) {
          renderProductCards(currentLang);
        }
      }

      function scheduleProductCarouselSetRefresh() {
        if (productCarouselSetRefreshTimer !== null) {
          window.clearTimeout(productCarouselSetRefreshTimer);
        }
        productCarouselSetRefreshTimer = window.setTimeout(() => {
          productCarouselSetRefreshTimer = null;
          refreshProductCarouselSets();
        }, 200);
      }

      function setupProductCarouselClickGuard() {
        window.addEventListener('click', (event) => {
          if (Date.now() < productCarouselSuppressClickUntil && isProductCarouselEvent(event)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      }

      function handleReduceMotionChange() {
        const autoScroll = getProductCarouselAutoScroll();
        if (!autoScroll) {
          return;
        }
        if (reduceMotion.matches) {
          autoScroll.stop();
        } else {
          autoScroll.play();
        }
      }

      function renderProductCards(lang) {
        if (!productGrid || productCatalog.length === 0) {
          return;
        }
        destroyProductCarousel();
        const entries = productCatalog
          .slice()
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        productGrid.innerHTML = '';
        productGrid.style.setProperty('--home-product-count', String(entries.length));

        const track = document.createElement('div');
        track.className = 'home-product-track';

        const appendProductCard = (item, index, isClone) => {
          const linkInfo = buildProductHref(item);
          const link = document.createElement('a');
          link.href = linkInfo.href;
          link.className = 'home-product-card';
          link.dataset.homeAnimate = 'true';
          link.draggable = false;
          link.style.setProperty('--home-delay', `${(index % entries.length) * 60}ms`);
          if (isClone) {
            link.classList.add('home-product-card--clone');
            link.setAttribute('aria-hidden', 'true');
            link.tabIndex = -1;
          }
          if (linkInfo.external) {
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
          }

          const titleText = lang === 'en' ? (item.title_en || item.title) : (item.title_ja || item.title);
          const descText = lang === 'en' ? (item.desc_en || item.desc) : (item.desc_ja || item.desc);
          const headerPath = (item.header || '').trim();
          const iconPath = (item.image || '').trim();
          const hasHeader = Boolean(headerPath);
          const hasIcon = Boolean(iconPath);
          const hasMedia = hasHeader || hasIcon;

          if (hasMedia) {
            const media = document.createElement('div');
            media.className = 'home-product-card__media';

            if (hasHeader) {
              const image = document.createElement('img');
              image.src = `products/${item.dir || ''}${headerPath}`;
              image.alt = `${titleText} preview`;
              image.className = 'home-product-card__media-image';
              image.loading = 'lazy';
              image.draggable = false;
              media.appendChild(image);
            } else {
              const placeholder = document.createElement('div');
              placeholder.className = 'home-product-card__media-placeholder';
              media.appendChild(placeholder);
            }

            if (hasIcon) {
              const iconBadge = document.createElement('div');
              iconBadge.className = 'home-product-card__icon-badge';

              const icon = document.createElement('img');
              icon.src = `products/${item.dir || ''}${iconPath}`;
              icon.alt = `${titleText} icon`;
              icon.className = 'home-product-card__icon';
              icon.loading = 'lazy';
              icon.draggable = false;

              iconBadge.appendChild(icon);
              media.appendChild(iconBadge);
            }

            link.appendChild(media);
          }

          const body = document.createElement('div');
          body.className = 'home-product-card__body';

          const title = document.createElement('h3');
          title.className = 'home-product-card__title';
          title.textContent = titleText;

          const description = document.createElement('p');
          description.className = 'home-product-card__description';
          description.textContent = descText;

          const meta = document.createElement('span');
          meta.className = 'home-product-card__cta';
          meta.textContent = linkInfo.external ? getCopy(lang, 'productExternalCta') : getCopy(lang, 'productCta');

          const arrow = document.createElement('span');
          arrow.setAttribute('aria-hidden', 'true');
          arrow.textContent = linkInfo.external ? '↗' : '→';
          meta.appendChild(arrow);

          body.appendChild(title);
          body.appendChild(description);
          body.appendChild(meta);
          link.appendChild(body);
          // Embla は loop 時にスライド(track の直接の子)へインライン transform を
          // 設定する。カード自身の transform(hover や入場アニメーション)と競合
          // しないよう、カードはラッパーで包んでおく。
          const slide = document.createElement('div');
          slide.className = 'home-product-slide';
          slide.appendChild(link);
          track.appendChild(slide);
        };

        entries.forEach((item, index) => appendProductCard(item, index, false));
        productGrid.appendChild(track);
        if (entries.length > 1) {
          fillProductCarouselSets(track, () => {
            entries.forEach((item, index) => appendProductCard(item, index, true));
          });
        }
        setupProductCarousel(entries.length);

        if (window.mdwTheme && typeof window.mdwTheme.focusPressables === 'function') {
          window.mdwTheme.focusPressables(productGrid);
        }
        productGrid.querySelectorAll('.home-product-card--clone').forEach((link) => {
          link.setAttribute('aria-hidden', 'true');
          link.tabIndex = -1;
        });
      }

      function updateLanguage(locale) {
        recordFallbacks();
        const lang = resolveLocale(locale);
        currentLang = lang;
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const key = el.getAttribute('data-i18n');
          if (!key) {
            return;
          }
          if (lang === 'ja') {
            const fallback = fallbackCopy[key];
            if (typeof fallback === 'string') {
              el.textContent = fallback;
            }
            return;
          }
          const text = translations[lang][key];
          if (typeof text === 'string') {
            el.textContent = text;
            return;
          }
          const fallback = fallbackCopy[key];
          if (typeof fallback === 'string') {
            el.textContent = fallback;
          }
        });
        syncLanguageSelects(lang);
        try {
          localStorage.setItem(STORAGE_KEY, lang);
        } catch (error) {
          /* ignore */
        }
        renderProductCards(lang);
        return lang;
      }

      function readStoredLanguage() {
        try {
          return localStorage.getItem(STORAGE_KEY);
        } catch (error) {
          return null;
        }
      }

      const controller = window.MDWLanguageTransition
        ? window.MDWLanguageTransition.create((lang) => updateLanguage(lang), { duration: LANG_TRANSITION_DURATION })
        : null;

      function applyLanguage(locale, options = {}) {
        const target = resolveLocale(locale);
        if (controller) {
          controller.apply(target, options);
        } else {
          updateLanguage(target);
        }
      }

      function setupLanguageSelector() {
        document.querySelectorAll('.lang-select').forEach((select) => {
          if (select.dataset.bound === 'true') {
            select.value = currentLang;
            return;
          }
          select.dataset.bound = 'true';
          select.addEventListener('change', (event) => {
            applyLanguage(event.target.value, { animate: true });
          });
          select.value = currentLang;
        });
      }

      function getHomeScrollStops() {
        const stops = sections.map((section) => ({
          id: section.id,
          element: section,
          align: 'start',
          role: 'content',
          observe: true
        }));
        if (footerTarget) {
          stops.push({
            id: footerTarget.id,
            element: footerTarget,
            align: 'document-end',
            role: 'auxiliary',
            contentAnchor: 'previous',
            observe: false
          });
        }
        return stops;
      }

      function getHomeNavControls() {
        return [...sectionButtons, footerNavLink].filter(Boolean);
      }

      function getHomeNavControlTarget(control) {
        return control.dataset.sectionTarget || control.dataset.footerTarget || '';
      }

      function updateHomeNavigationHistory({ stop, options }) {
        if (!window.history) {
          return;
        }
        if (stop.role === 'auxiliary') {
          if (options.updateHistory !== false && window.history.pushState) {
            window.history.pushState(null, '', '#' + stop.id);
          }
          return;
        }
        if (window.location.hash === '#home-footer' && window.history.replaceState) {
          window.history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      }

      function shouldYieldHomeWheel(event, gesture) {
        return isProductCarouselEvent(event) && (gesture.shiftKey || gesture.horizontalDominant);
      }

      function shouldYieldHomeTouch(event, gesture) {
        if (!isProductCarouselEvent(event)) {
          return false;
        }
        const intentThreshold = window.MDWSegmentedScroll.DEFAULT_TIMINGS.touchIntentThreshold;
        if (gesture.absDeltaX >= intentThreshold && gesture.horizontalDominant) {
          return true;
        }
        return gesture.absDeltaY < intentThreshold;
      }

      function scrollToHomeSection(section) {
        return Boolean(sectionNavigation && section && sectionNavigation.goTo(section.id, {
          source: 'section-control'
        }));
      }

      function scrollToFooter(options = {}) {
        return Boolean(sectionNavigation && footerTarget && sectionNavigation.goTo(footerTarget.id, {
          ...options,
          source: 'footer-control'
        }));
      }

      function setupSectionNavigation() {
        const index = window.MDWSegmentedScroll.createStopIndex({
          initialId: sectionButtons[0] ? sectionButtons[0].dataset.sectionTarget : ''
        });
        const segments = window.MDWSegmentedScroll.createSegmentController({
          index,
          track: sectionNav,
          getControls: getHomeNavControls,
          getTargetId: getHomeNavControlTarget
        });
        sectionNavigation = window.MDWSegmentedScroll.createScrollController({
          index,
          segments,
          getStops: getHomeScrollStops,
          reduceMotion,
          managedClass: 'home-scroll-managed',
          visibleClass: 'is-visible',
          shouldYieldWheel: shouldYieldHomeWheel,
          shouldYieldTouch: shouldYieldHomeTouch,
          onNavigate: updateHomeNavigationHistory
        });

        sectionButtons.forEach((button) => {
          button.addEventListener('click', () => {
            const section = document.getElementById(button.dataset.sectionTarget);
            scrollToHomeSection(section);
          });
        });

        document.querySelectorAll('[data-section-link]').forEach((link) => {
          link.addEventListener('click', (event) => {
            const section = document.getElementById(link.dataset.sectionLink);
            if (!section) {
              return;
            }
            event.preventDefault();
            scrollToHomeSection(section);
          });
        });

        if (footerNavLink) {
          footerNavLink.addEventListener('click', (event) => {
            event.preventDefault();
            scrollToFooter();
          });
        }

        sectionNavigation.mount();
      }

      function loadFeaturedProducts() {
        if (!productGrid) {
          return;
        }
        fetch('products/index.json')
          .then((response) => {
            if (!response.ok) {
              throw new Error('products/index.json の読み込みに失敗しました');
            }
            return response.json();
          })
          .then((items) => {
            productCatalog = Array.isArray(items) ? items : [];
            renderProductCards(currentLang);
          })
          .catch(() => {
            productGrid.innerHTML = '';
            const fallback = document.createElement('a');
            fallback.href = 'products/index.html';
            fallback.className = 'home-product-card home-product-card--fallback';
            fallback.dataset.transitionDirection = 'right';
            fallback.textContent = getCopy(currentLang, 'productsAllCta') || 'プロダクト一覧';
            productGrid.appendChild(fallback);
          });
      }

      setupSectionViewportSizing();
      applyLanguage(currentLang);
      setupSectionNavigation();
      setupProductCarouselClickGuard();
      if (typeof reduceMotion.addEventListener === 'function') {
        reduceMotion.addEventListener('change', handleReduceMotionChange);
      }
      loadFeaturedProducts();
      setupLanguageSelector();
      window.addEventListener('mdw:footer-loaded', () => {
        setupLanguageSelector();
        applyLanguage(currentLang);
      });
    })();
  </script>
  <script vite-ignore src="vendor/html2canvas.min.js"></script>
  <script vite-ignore src="vendor/liquidGL.js"></script>
  <script vite-ignore src="vendor/liquidgl-init.js"></script>
</body>
</html>
